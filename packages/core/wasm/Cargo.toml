[package]
name = "content-blocker-wasm"
version = "0.1.0"
edition = "2021"
description = "WASM-optimized pattern matching engine for content blocker"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde-wasm-bindgen = "0.6"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
